<!-- DBus system bus policy for the DuaScreenAligner daemon.
     Allows the root user to own the bus name, and any user to call methods. -->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Allow root to own the daemon bus name -->
  <policy user="root">
    <allow own="com.github.duascreenaligner.Daemon"/>
    <allow send_destination="com.github.duascreenaligner.Daemon"/>
    <allow send_interface="com.github.duascreenaligner.Daemon"/>
  </policy>

  <!-- Allow any logged-in user to call daemon methods -->
  <policy context="default">
    <allow send_destination="com.github.duascreenaligner.Daemon"
           send_interface="com.github.duascreenaligner.Daemon"/>
    <allow send_destination="com.github.duascreenaligner.Daemon"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="com.github.duascreenaligner.Daemon"
           send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>

</busconfig>
